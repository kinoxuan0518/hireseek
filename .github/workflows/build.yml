name: Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry
        uses: Swatinem/rust-cache@v2

      - name: Build
        run: cargo build --manifest-path claw-code/rust/Cargo.toml --release

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: claw-code-binary
          path: claw-code/rust/target/release/claw-code
